# Run zca-bridge straight from the prebuilt image — no source checkout, no build.
# Download just this file (and a .env) and run it:
#
#   cp .env.example .env   # set CHATWOOT_BASE_URL (your existing Chatwoot),
#                          # CREDENTIALS_KEY, PUBLIC_BASE_URL...
#   docker compose -f docker-compose.full.yml up -d
#
#   Bridge: http://localhost:4000
#
# Bring your own Chatwoot — point CHATWOOT_BASE_URL at it in .env.
# The image is pulled from GitHub Container Registry; the package must be public
# (otherwise run `docker login ghcr.io` first).

services:
  # Dedicated Postgres for the bridge (separate from Chatwoot's database).
  bridge-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zca
      POSTGRES_USER: zca
      POSTGRES_PASSWORD: zca
    volumes: ["bridge_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zca"]
      interval: 5s
      timeout: 5s
      retries: 10

  zca-bridge:
    image: ghcr.io/diendh/zca-bridge:latest
    restart: unless-stopped
    env_file: .env
    # Use the bundled bridge-db regardless of the .env default.
    environment:
      DATABASE_URL: postgres://zca:zca@bridge-db:5432/zca
    depends_on:
      bridge-db: { condition: service_healthy }
    ports: ["4000:4000"]
    # Durable media archive (survives Zalo link expiry / deletion).
    volumes: ["zalo_media:/archive"]

volumes:
  bridge_pg:
  zalo_media:
